<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The Blue Ribbon</title>
    <style>
      :root{--accent:#0b74de;--selected:#f39c12;--bg:#fff;--text:#111;--muted:#666;--card-bg:#fbfbfc;--card-border:#eee;--tooltip-bg:#222;--map-stroke:#000}
      /* system dark mode defaults */
      @media (prefers-color-scheme: dark){
        :root{--bg:#0b1014;--text:#e6eef6;--muted:#9aa6b2;--card-bg:#0b1216;--card-border:#1f2933;--tooltip-bg:#111;--map-stroke:#e6eef6}
      }
      /* explicit overrides when user selects theme via data-theme attribute */
      :root[data-theme="dark"]{
        --bg:#0b1014;--text:#e6eef6;--muted:#9aa6b2;--card-bg:#0b1216;--card-border:#1f2933;--tooltip-bg:#111;--map-stroke:#e6eef6
      }
      :root[data-theme="light"]{
        --bg:#ffffff;--text:#111111;--muted:#666666;--card-bg:#fbfbfc;--card-border:#eeeeee;--tooltip-bg:#222222;--map-stroke:#000000
      }
      html,body{box-sizing:border-box;width:100%}
      html{scrollbar-gutter:stable both-edges;}
      body{overflow-y:scroll}
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;display:block;padding:24px;background:var(--bg);color:var(--text)}
      .container{max-width:1100px;margin:0 auto}
      a.button{display:inline-block;padding:12px 16px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>The Blue Ribbon</h1>
      <h2><a href="https://github.com/Jeshii/">Jeshii</a> presents some random projects.</h2>
      <p><a class="button" href="prefecturizer.html">Prefecturizer</a></p>
    </div>
  </body>
</html>
